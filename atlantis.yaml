version: 3

workflows:
  cyber-range-lab:
    plan:
      steps:
        - env:
            name: ARM_MSI_ENDPOINT
            command: 'printf "%s" "$IDENTITY_ENDPOINT"'

        - env:
            name: ARM_MSI_API_VERSION
            value: "2019-08-01"

        - init:
            extra_args:
              - "-backend-config=backends/prod-acr.backend.tfvars"
              - "-reconfigure"

        - plan:
            extra_args:
              - "-var-file=tfvars/prod-acr.tfvars"

    apply:
      steps:
        - env:
            name: ARM_MSI_ENDPOINT
            command: 'printf "%s" "$IDENTITY_ENDPOINT"'

        - env:
            name: ARM_MSI_API_VERSION
            value: "2019-08-01"

        - apply

projects:
  - name: cyber-range-lab
    dir: .
    workspace: default
    workflow: cyber-range-lab

    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "tfvars/prod-acr.tfvars"
        - "backends/prod-acr.backend.tfvars"
        - "artifacts/scripts/**"

    apply_requirements:
      - mergeable
      - undiverged